services:
  nordvpn:
    image: ghcr.io/bubuntux/nordvpn:latest
    container_name: dmaga-nordvpn
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun
    environment:
      TOKEN: ${NORDVPN_TOKEN:?Set NORDVPN_TOKEN in .env before starting the VPN-routed stack}
      TECHNOLOGY: NordLynx
      KILLSWITCH: "on"
      CONNECT: ${NORDVPN_CONNECT:-United_Kingdom}
      TZ: Europe/London
      # Whitelist the local Compose subnet past the killswitch so the app can
      # reach the proxy/FlareSolverr that ride this netns (and they can reply).
      # Must match the pinned `networks.default` subnet below.
      NETWORK: "172.30.0.0/24"
    ports:
      # FlareSolverr's debug endpoint (it shares this container's netns). The app
      # itself now publishes :3000 directly; only indexer egress rides the VPN.
      - "8191:8191"
    healthcheck:
      test: ["CMD-SHELL", "nordvpn status | grep -q 'Status: Connected'"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 60s

  # HTTP forward proxy that rides the nordvpn netns. The app routes ONLY indexer
  # lookups through it (INDEXER_PROXY_URL), so that traffic egresses via the VPN
  # while the app's database/Redis/Real-Debrid traffic stays direct.
  proxy:
    build:
      context: ./docker/tinyproxy
    container_name: dmaga-proxy
    restart: unless-stopped
    network_mode: service:nordvpn
    depends_on:
      nordvpn:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dmaga-app
    command: pnpm dev
    restart: unless-stopped
    # tini as PID 1 forwards SIGTERM to `pnpm dev`/Next and reaps children, so
    # the container exits promptly on `down` instead of waiting out the kill
    # timeout. The grace period caps that wait as a backstop.
    init: true
    stop_grace_period: 10s
    # On the normal Compose network (not the VPN netns): DB/Redis/Real-Debrid
    # egress directly. Only indexer lookups are proxied over the VPN, via
    # INDEXER_PROXY_URL below.
    ports:
      - "3000:3000"
    # Optional secrets are interpolated from .env when present; network URLs
    # below always win for in-cluster DNS.
    environment:
      DATABASE_URL: postgresql://dmaga:dmaga@postgres:5432/dmaga
      REDIS_URL: redis://redis:6379
      # FlareSolverr and the indexer proxy ride the nordvpn netns, reachable as
      # `nordvpn` on the Compose network.
      FLARESOLVERR_URL: http://nordvpn:8191/v1
      INDEXER_PROXY_URL: http://nordvpn:8888
      REAL_DEBRID_CLIENT_ID: ${REAL_DEBRID_CLIENT_ID:-}
      REAL_DEBRID_CLIENT_SECRET: ${REAL_DEBRID_CLIENT_SECRET:-}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}
      # Override with http://MACHINE_IP:3000 when accessing from other LAN devices.
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      HOST_DOWNLOAD_DIR: /downloads
      # inotify events don't cross the podman VM bind mount on macOS, so the
      # Next.js (webpack) dev watcher never sees host edits. Poll instead → HMR works.
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      # Keep container-managed build artefacts out of the host bind mount so a
      # host-built (and platform-mismatched) cache can't corrupt the container.
      - /app/node_modules
      - /app/.next
      - downloads:/downloads
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Indexer search needs these (both ride the VPN netns), but the app serves
      # the UI / playback before they're ready, so only wait for "started".
      flaresolverr:
        condition: service_started
      proxy:
        condition: service_started

  debrid-poller:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dmaga-debrid-poller
    command: pnpm worker:debrid
    restart: unless-stopped
    init: true
    stop_grace_period: 10s
    # Polls Real-Debrid only (no indexer lookups), so it stays off the VPN and
    # talks to Postgres/Redis/Real-Debrid directly.
    environment:
      DATABASE_URL: postgresql://dmaga:dmaga@postgres:5432/dmaga
      REDIS_URL: redis://redis:6379
      REAL_DEBRID_CLIENT_ID: ${REAL_DEBRID_CLIENT_ID:-}
      REAL_DEBRID_CLIENT_SECRET: ${REAL_DEBRID_CLIENT_SECRET:-}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}
      HOST_DOWNLOAD_DIR: /downloads
    volumes:
      - .:/app
      - /app/node_modules
      - downloads:/downloads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: dmaga-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dmaga
      POSTGRES_PASSWORD: dmaga
      POSTGRES_DB: dmaga
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dmaga -d dmaga"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: dmaga-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: dmaga-flaresolverr
    restart: unless-stopped
    network_mode: service:nordvpn
    environment:
      LOG_LEVEL: info
      TZ: Europe/London
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8191/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      nordvpn:
        condition: service_healthy

networks:
  # Pinned so the nordvpn killswitch whitelist (the `NETWORK` env above) has a
  # stable subnet to allow. Keep the two values in sync.
  default:
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  postgres-data:
  redis-data:
  downloads:

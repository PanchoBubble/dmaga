services:
  # NordVPN via gluetun (replaced the 1.1GB ghcr.io/bubuntux/nordvpn image with
  # this ~50MB one). gluetun is killswitch-by-default. NOTE: gluetun's NordVPN
  # WireGuard backend needs a WIREGUARD_PRIVATE_KEY (the old NORDVPN_TOKEN does
  # NOT work) — get it from the NordVPN dashboard → Manual setup / NordLynx
  # config. OpenVPN fallback: set VPN_TYPE=openvpn with OPENVPN_USER/PASSWORD
  # service credentials instead.
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: dmaga-gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    environment:
      VPN_SERVICE_PROVIDER: nordvpn
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: ${NORDVPN_WIREGUARD_PRIVATE_KEY:?Set NORDVPN_WIREGUARD_PRIVATE_KEY in .env (from NordVPN dashboard → Manual setup / NordLynx) before starting the VPN-routed stack}
      SERVER_COUNTRIES: ${NORDVPN_COUNTRY:-Germany}
      TZ: Europe/London
      # Allow the local Compose subnet past the killswitch so the app can reach
      # the proxy/FlareSolverr that ride this netns (and they can reply).
      # Must match the pinned `networks.default` subnet below.
      FIREWALL_OUTBOUND_SUBNETS: 172.30.0.0/24
      # Open gluetun's firewall for the ports its netns-sharing siblings serve on
      # the Compose network: FlareSolverr (8191) and tinyproxy (8888).
      FIREWALL_INPUT_PORTS: 8191,8888
    ports:
      # FlareSolverr's debug endpoint (it shares this container's netns). The app
      # itself now publishes :3000 directly; only indexer egress rides the VPN.
      - "8191:8191"
    # gluetun's image defines no Docker HEALTHCHECK, so `depends_on:
    # service_healthy` has nothing to wait on unless we add one. gluetun runs an
    # internal healthcheck server on 127.0.0.1:9999 and `/gluetun-entrypoint
    # healthcheck` is its client — the canonical gluetun compose healthcheck.
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # HTTP forward proxy that rides the gluetun (VPN) netns. The app routes ONLY
  # indexer lookups through it (INDEXER_PROXY_URL), so that traffic egresses via
  # the VPN while the app's database/Redis/Real-Debrid traffic stays direct.
  proxy:
    build:
      context: ./docker/tinyproxy
    container_name: dmaga-proxy
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dmaga-app
    command: sh -c "pnpm build && pnpm start"
    restart: unless-stopped
    # tini as PID 1 forwards SIGTERM to Next and reaps children, so
    # the container exits promptly on `down` instead of waiting out the kill
    # timeout. The grace period caps that wait as a backstop.
    init: true
    stop_grace_period: 10s
    # On the normal Compose network (not the VPN netns): DB/Redis/Real-Debrid
    # egress directly. Only indexer lookups are proxied over the VPN, via
    # INDEXER_PROXY_URL below.
    ports:
      - "80:3000"
    # Optional secrets are interpolated from .env when present; network URLs
    # below always win for in-cluster DNS.
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://dmaga:dmaga@postgres:5432/dmaga}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      # FlareSolverr and the indexer proxy ride the gluetun (VPN) netns,
      # reachable as `gluetun` on the Compose network.
      FLARESOLVERR_URL: "${FLARESOLVERR_URL:-http://gluetun:8191/v1}"
      INDEXER_PROXY_URL: "${INDEXER_PROXY_URL:-http://gluetun:8888}"
      REAL_DEBRID_CLIENT_ID: "${REAL_DEBRID_CLIENT_ID:-}"
      REAL_DEBRID_CLIENT_SECRET: "${REAL_DEBRID_CLIENT_SECRET:-}"
      MYANIMELIST_CLIENT_ID: "${MYANIMELIST_CLIENT_ID:-}"
      MYANIMELIST_CLIENT_SECRET: "${MYANIMELIST_CLIENT_SECRET:-}"
      TOKEN_ENCRYPTION_KEY: "${TOKEN_ENCRYPTION_KEY:-}"
      # Override with http://MACHINE_IP:3000 when accessing from other LAN devices.
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      HOST_DOWNLOAD_DIR: "${HOST_DOWNLOAD_DIR:-/downloads}"
      NODE_ENV: production
    volumes:
      - .:/app
      # Keep container-managed build artefacts out of the host bind mount so a
      # host-built (and platform-mismatched) cache can't corrupt the container.
      # NAMED (not anonymous) so a recreate reuses one volume instead of
      # orphaning a fresh ~720MB node_modules copy every time — that pile-up was
      # what filled the VM disk. `make rebuild` drops them to refresh on dep
      # changes; a plain restart keeps them for a fast, no-reinstall start.
      - app-node-modules:/app/node_modules
      - app-next:/app/.next
      - downloads:/downloads
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Indexer search needs these (both ride the VPN netns), but the app serves
      # the UI / playback before they're ready, so only wait for "started".
      flaresolverr:
        condition: service_started
      proxy:
        condition: service_started

  debrid-poller:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dmaga-debrid-poller
    command: pnpm worker:debrid
    restart: unless-stopped
    init: true
    stop_grace_period: 10s
    # Polls Real-Debrid only (no indexer lookups), so it stays off the VPN and
    # talks to Postgres/Redis/Real-Debrid directly.
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://dmaga:dmaga@postgres:5432/dmaga}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      REAL_DEBRID_CLIENT_ID: "${REAL_DEBRID_CLIENT_ID:-}"
      REAL_DEBRID_CLIENT_SECRET: "${REAL_DEBRID_CLIENT_SECRET:-}"
      MYANIMELIST_CLIENT_ID: "${MYANIMELIST_CLIENT_ID:-}"
      MYANIMELIST_CLIENT_SECRET: "${MYANIMELIST_CLIENT_SECRET:-}"
      TOKEN_ENCRYPTION_KEY: "${TOKEN_ENCRYPTION_KEY:-}"
      HOST_DOWNLOAD_DIR: "${HOST_DOWNLOAD_DIR:-/downloads}"
    volumes:
      - .:/app
      # Named (not anonymous) — see the app service for why. Its own volume so
      # the two services don't share a node_modules mount.
      - poller-node-modules:/app/node_modules
      - downloads:/downloads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: dmaga-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dmaga
      POSTGRES_PASSWORD: dmaga
      POSTGRES_DB: dmaga
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dmaga -d dmaga"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: dmaga-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: dmaga-flaresolverr
    restart: unless-stopped
    network_mode: service:gluetun
    environment:
      LOG_LEVEL: info
      TZ: Europe/London
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8191/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      gluetun:
        condition: service_healthy

networks:
  # Pinned so the gluetun killswitch allowance (FIREWALL_OUTBOUND_SUBNETS above)
  # has a stable subnet to allow. Keep the two values in sync.
  default:
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  postgres-data:
  redis-data:
  downloads:
  # Build artefacts the container manages (shadowing the host bind mount).
  # Named so recreates reuse them; `make rebuild` removes them to refresh.
  app-node-modules:
  app-next:
  poller-node-modules:

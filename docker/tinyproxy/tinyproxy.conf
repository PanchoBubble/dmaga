User tinyproxy
Group tinyproxy

# Bind all interfaces inside the shared nordvpn netns; the app reaches this at
# http://nordvpn:8888 over the local Compose subnet.
Port 8888

Timeout 600
LogLevel Warning

# Only the local Compose subnet may use the proxy (must match the pinned
# `networks.default` subnet in docker-compose.yml).
Allow 172.30.0.0/24

# Don't advertise that traffic was proxied.
DisableViaHeader Yes

# No `ConnectPort` lines on purpose: allow CONNECT (HTTPS) to any port, since
# indexers can live on non-standard ports.
